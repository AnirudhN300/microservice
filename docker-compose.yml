services:

  frontend:
    build:
      context: ./src/frontend
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      PRODUCT_CATALOG_SERVICE_ADDR: productcatalogservice:3550
      CURRENCY_SERVICE_ADDR: currencyservice:7000
      CART_SERVICE_ADDR: cartservice:7070
      RECOMMENDATION_SERVICE_ADDR: recommendationservice:8080
      SHIPPING_SERVICE_ADDR: shippingservice:50051
      CHECKOUT_SERVICE_ADDR: checkoutservice:5050
      AD_SERVICE_ADDR: adservice:9555
      SHOPPING_ASSISTANT_SERVICE_ADDR: dummy:8080
      DISABLE_PROFILER: "1"
    depends_on:
      - productcatalogservice
      - currencyservice
      - cartservice
      - recommendationservice
      - shippingservice
      - checkoutservice
      - paymentservice
      - emailservice
      - adservice
      - redis
      - authservice

  productcatalogservice:
    image: gcr.io/google-samples/microservices-demo/productcatalogservice:v0.10.0
    ports:
      - "3550:3550"
    environment:
      PORT: 3550
      DISABLE_PROFILER: "1"

  currencyservice:
    image: gcr.io/google-samples/microservices-demo/currencyservice:v0.10.0
    ports:
      - "7000:7000"
    environment:
      PORT: 7000
      DISABLE_PROFILER: "1"

  cartservice:
    image: gcr.io/google-samples/microservices-demo/cartservice:v0.10.0
    ports:
      - "7070:7070"
    environment:
      REDIS_ADDR: redis:6379
      DISABLE_PROFILER: "1"
    depends_on:
      - redis

  recommendationservice:
    image: gcr.io/google-samples/microservices-demo/recommendationservice:v0.10.0
    ports:
      - "8081:8080"
    environment:
      PRODUCT_CATALOG_SERVICE_ADDR: productcatalogservice:3550
      DISABLE_PROFILER: "1"

  shippingservice:
    image: gcr.io/google-samples/microservices-demo/shippingservice:v0.10.0
    ports:
      - "50051:50051"
    environment:
      DISABLE_PROFILER: "1"

  checkoutservice:
    image: gcr.io/google-samples/microservices-demo/checkoutservice:v0.10.0
    ports:
      - "5050:5050"
    environment:
      PRODUCT_CATALOG_SERVICE_ADDR: productcatalogservice:3550
      SHIPPING_SERVICE_ADDR: shippingservice:50051
      PAYMENT_SERVICE_ADDR: paymentservice:50051
      EMAIL_SERVICE_ADDR: emailservice:8080
      CURRENCY_SERVICE_ADDR: currencyservice:7000
      CART_SERVICE_ADDR: cartservice:7070
      DISABLE_PROFILER: "1"

  paymentservice:
    image: gcr.io/google-samples/microservices-demo/paymentservice:v0.10.0
    ports:
      - "50052:50051"
    environment:
      PORT: 50051
      DISABLE_PROFILER: "1"

  emailservice:
    build:
      context: ./src/emailservice
    ports:
      - "8082:8080"
    environment:
      DISABLE_PROFILER: "1"
      SMTP_SERVER: smtp.gmail.com
      SMTP_PORT: 587
      SENDER_EMAIL: yourgmail@gmail.com
      SENDER_PASSWORD: your_app_password

  adservice:
    image: gcr.io/google-samples/microservices-demo/adservice:v0.10.0
    ports:
      - "9555:9555"
    environment:
      DISABLE_PROFILER: "1"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: usersdb
    ports:
      - "3307:3306"

  authservice:
    build:
      context: ./src/authservice
    ports:
      - "3000:3000"
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: usersdb
      JWT_SECRET: mysecretkey
    depends_on:
      - mysql